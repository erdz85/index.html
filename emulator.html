<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        body {
            background-color: #0e1117;
            color: #ffffff;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        #picker-container {
            text-align: center;
            padding: 40px 20px;
            border: 2px dashed #31333f;
            border-radius: 10px;
            background: #131722;
            width: 80%;
            max-width: 500px;
        }
        .btn-upload {
            display: inline-block;
            background-color: #ff4b4b;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 15px;
        }
        input[type="file"] { display: none; }
        
        #game-container {
            display: none;
            width: 100%;
            height: 650px;
        }
        #game { width: 100%; height: 100%; }

        @media (min-width: 500px) {
            #game-container {
                height: 380px !important;
            }
        }
    </style>
</head>
<body>

    <div id="picker-container">
        <h3>Load your NES Game</h3>
        <p style="color: #a3a8b4; font-size: 14px;">Select a .nes or .zip ROM file from your phone storage to start playing.</p>
        <label class="btn-upload">
            Choose File
            <input type="file" id="rom-file" accept=".nes,.zip">
        </label>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script type="text/javascript">
        document.getElementById('rom-file').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            window.EJS_player = '#game';
            window.EJS_core = 'nes'; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/';
            window.EJS_gameUrl = URL.createObjectURL(file); 

            document.getElementById('picker-container').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';

            const loaderScript = document.createElement('script');
            loaderScript.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            document.body.appendChild(loaderScript);
        });
    </script>
</body>
</html>
